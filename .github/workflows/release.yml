name: VeriFetch CD Release

on:
  push:
    tags:
      - 'v*' # Triggers automation only when a strictly versioned tag is pushed (e.g. v1.0.1)

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed specifically to draft GitHub Releases and attach binaries natively

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Package VSIX
        run: npx --yes @vscode/vsce package
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }} # Secure execution environment for VSCE

      - name: Extract VSIX Payload
        id: vsix
        run: echo "VSIX_FILE=$(ls *.vsix)" >> $GITHUB_ENV

      - name: GitHub Release Engine
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.VSIX_FILE }}
          generate_release_notes: true
